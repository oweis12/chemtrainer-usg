<!doctype html>
<html lang="nl">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Fase 1 screenshots</title>
    <style>
      :root { color-scheme: light; }
      body {
        margin: 0;
        font-family: Arial, Helvetica, sans-serif;
        background: #f4f1e8;
        color: #182238;
      }
      header {
        padding: 20px 24px;
        border-bottom: 1px solid #b8c2d6;
        background: #fbf8f0;
      }
      h1 {
        margin: 0 0 6px;
        font-size: 20px;
      }
      p {
        margin: 0;
        color: #4b5874;
      }
      main {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
        gap: 16px;
        padding: 16px;
      }
      figure {
        margin: 0;
        background: #fff;
        border: 1px solid #c7d0e0;
        border-radius: 8px;
        overflow: hidden;
      }
      img {
        display: block;
        width: 100%;
        height: auto;
      }
      figcaption {
        padding: 10px 12px 12px;
        font-size: 14px;
        color: #2b3650;
      }
      a {
        color: inherit;
        text-decoration: none;
      }
    </style>
  </head>
  <body>
    <header>
      <h1>Fase 1 screenshot-overzicht</h1>
      <p>Klik op een afbeelding om de losse screenshot te openen.</p>
    </header>
    <main>
      <figure>
        <a href="./fase1-begeleid-fullscreen.png"><img src="./fase1-begeleid-fullscreen.png" alt="Begeleid oefenen fullscreen" /></a>
        <figcaption>Begeleid oefenen fullscreen</figcaption>
      </figure>
      <figure>
        <a href="./fase1-begeleid-halfwidth.png"><img src="./fase1-begeleid-halfwidth.png" alt="Begeleid oefenen half-screen" /></a>
        <figcaption>Begeleid oefenen half-screen</figcaption>
      </figure>
      <figure>
        <a href="./fase1-begeleid-mobile.png"><img src="./fase1-begeleid-mobile.png" alt="Begeleid oefenen mobiel" /></a>
        <figcaption>Begeleid oefenen mobiel</figcaption>
      </figure>
      <figure>
        <a href="./fase1-zelf-fullscreen.png"><img src="./fase1-zelf-fullscreen.png" alt="Zelf oefenen fullscreen" /></a>
        <figcaption>Zelf oefenen fullscreen</figcaption>
      </figure>
      <figure>
        <a href="./fase1-zelf-mobile.png"><img src="./fase1-zelf-mobile.png" alt="Zelf oefenen mobiel" /></a>
        <figcaption>Zelf oefenen mobiel</figcaption>
      </figure>
    </main>
  </body>
</html>
